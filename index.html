<style>
:root{
  --bg:#1e1e22;
  --surface:#28282e;
  --surface2:#32323a;
  --surface3:#3a3a44;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:#e8e6e2;
  --text-muted:#909090;
  --text-dim:#5a5a5a;
  --accent:#e86a1a;
  --accent-dim:rgba(232,106,26,0.15);
  --accent-dim2:rgba(232,106,26,0.07);
  --h-color:#7eb8f7;
  --h-bg:rgba(126,184,247,0.1);
  --h-bdr:rgba(126,184,247,0.22);
  --b-color:#5ecf82;
  --b-bg:rgba(94,207,130,0.08);
  --b-bdr:rgba(94,207,130,0.22);
  --radius:12px;
  --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;overflow:hidden}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 15% 0%,rgba(232,106,26,0.04) 0%,transparent 70%),
    radial-gradient(ellipse 40% 30% at 85% 100%,rgba(80,80,180,0.03) 0%,transparent 70%);
  z-index:0;
}

.app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}

/* ===== HEADER ===== */
.header{
  flex-shrink:0;
  border-bottom:1px solid var(--border);
  padding:0 28px;display:flex;align-items:center;gap:16px;height:52px;
}
.logo{font-size:22px;font-weight:900;letter-spacing:-1px;color:var(--text);margin-right:4px}
.logo em{color:var(--accent);font-style:normal}
.tagline{font-size:12px;color:var(--text-dim);letter-spacing:0.3px}
.hd-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.hd-btn{
  padding:6px 14px;font-size:12px;font-weight:500;
  border:1px solid var(--border2);border-radius:var(--radius-sm);
  background:none;color:var(--text-muted);cursor:pointer;
  font-family:'Zen Kaku Gothic New',sans-serif;transition:all .15s;
}
.hd-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.hd-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
.hd-btn.primary:hover{opacity:.88}

/* ===== FIXED PREVIEW ===== */
.preview-fixed{
  flex-shrink:0;
  border-bottom:1px solid var(--border);
  padding:16px 28px 14px;
  background:#fff;
}
.pf-displays{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.pf-box{
  background:#fff;
  border:1px solid rgba(0,0,0,0.1);border-radius:var(--radius);
  padding:20px 20px 10px;min-height:60px;
  display:flex;align-items:center;
  position:relative;transition:border-color .2s;
  cursor:text;
}
.pf-box:hover{border-color:rgba(0,0,0,0.2)}
.pf-box.drop-over{border:1.5px dashed var(--accent);background:#fff8f4}
.pf-role{
  position:absolute;top:6px;left:14px;
  font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:#aaa;
}
.pf-font-label{
  position:absolute;top:6px;right:12px;
  font-size:10px;color:var(--accent);font-weight:700;letter-spacing:0.3px;
  transition:opacity .15s;
}
.pf-font-label:hover{opacity:.7;text-decoration:underline}
.pf-drop-hint{
  position:absolute;bottom:7px;right:12px;
  font-size:9px;color:#bbb;pointer-events:none;letter-spacing:.3px;
}
.pf-text{
  line-height:1.4;color:#0e0e10;
  outline:none;width:100%;background:none;border:none;
  font-family:inherit;cursor:text;padding-top:2px;
}
.pf-controls{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.sz-group{display:flex;align-items:center;gap:8px}
.sz-label{font-size:11px;color:#888;white-space:nowrap}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:110px;height:2px;background:#ddd;
  border-radius:99px;outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--accent);cursor:pointer;
}
.sz-val{font-size:12px;font-weight:700;min-width:34px;color:var(--accent)}

/* ===== TAB BAR ===== */
.tab-bar{
  flex-shrink:0;display:flex;gap:4px;
  padding:10px 28px 0;
  border-bottom:1px solid var(--border);
}
.tab{
  padding:7px 20px 9px;font-size:13px;font-weight:500;cursor:pointer;
  border:none;background:none;color:var(--text-muted);
  border-bottom:2px solid transparent;margin-bottom:-1px;
  font-family:'Zen Kaku Gothic New',sans-serif;transition:all .2s;
  white-space:nowrap;border-radius:var(--radius-sm) var(--radius-sm) 0 0;
}
.tab:hover:not(.active){color:var(--text);background:var(--surface2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.tab-badge{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--accent);color:#fff;
  border-radius:99px;font-size:10px;font-weight:900;
  min-width:18px;height:18px;padding:0 5px;margin-left:6px;
}

/* ===== PANELS ===== */
.panels{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.panel.active{display:flex}

/* ===== TAB1 ===== */
.t1-ctrl{
  flex-shrink:0;border-bottom:1px solid var(--border);
  padding:8px 28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.filter-row{display:flex;gap:4px;flex-wrap:wrap}
.fbtn{
  font-size:11px;padding:4px 12px;border-radius:99px;
  border:1px solid var(--border2);background:none;
  color:var(--text-muted);cursor:pointer;
  font-family:'Zen Kaku Gothic New',sans-serif;transition:all .15s;
}
.fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
.fbtn:hover:not(.active){background:var(--surface2);color:var(--text)}
.srch{
  margin-left:auto;padding:6px 12px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:12px;background:var(--surface);color:var(--text);
  outline:none;font-family:'Zen Kaku Gothic New',sans-serif;width:160px;
}
.srch:focus{border-color:var(--border2)}
.srch::placeholder{color:var(--text-dim)}

.t1-body{flex:1;overflow-y:auto;padding:20px 28px}
.sec-hd{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--border)}
.fgrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:8px;margin-bottom:20px;
}

/* font card */
.fc{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  transition:border-color .15s;cursor:grab;
}
.fc:hover{border-color:var(--border2)}
.fc:active{cursor:grabbing}
.fc-prev{padding:16px 14px 8px;min-height:80px;display:flex;align-items:flex-end}
.fc-samp{line-height:1.1;color:var(--text);word-break:break-all;pointer-events:none}
.fc-foot{
  padding:7px 10px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:5px;
}
.fc-name{
  font-size:10px;color:var(--text-muted);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  cursor:pointer;transition:color .15s;
}
.fc-name:hover{color:var(--accent)}
.fc-tag{
  font-size:9px;padding:1px 5px;border-radius:3px;
  border:1px solid var(--border);color:var(--text-dim);background:var(--surface2);
}
.fc-tag.local{background:rgba(74,222,128,0.1);color:#4ade80;border-color:rgba(74,222,128,0.25)}
.hb-btns{display:flex;gap:3px;flex-shrink:0}
.hb{
  padding:2px 8px;font-size:10px;font-weight:700;border-radius:4px;cursor:pointer;
  border:1px solid var(--border2);background:none;color:var(--text-dim);
  font-family:'Zen Kaku Gothic New',sans-serif;transition:all .15s;
}
.hb.h-on{background:var(--h-bg);color:var(--h-color);border-color:var(--h-bdr)}
.hb.b-on{background:var(--b-bg);color:var(--b-color);border-color:var(--b-bdr)}
.hb:hover:not(.h-on):not(.b-on){background:var(--surface2);color:var(--text-muted)}

/* ===== TAB2 ===== */
.t2-body{flex:1;overflow-y:auto;padding:20px 28px}
.t2-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.col-hd{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:0 0 10px;border-bottom:1px solid;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
}
.col-hd.ch{color:var(--h-color);border-color:var(--h-bdr)}
.col-hd.cb{color:var(--b-color);border-color:var(--b-bdr)}
.col-count{font-size:10px;font-weight:400;opacity:.6}

/* checked font card */
.cfc{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;margin-bottom:8px;
  cursor:grab;transition:border-color .15s;
}
.cfc:hover{border-color:var(--border2)}
.cfc:active{cursor:grabbing}
.cfc.selected-h{border-color:var(--h-color);box-shadow:0 0 0 1px var(--h-bdr)}
.cfc.selected-b{border-color:var(--b-color);box-shadow:0 0 0 1px var(--b-bdr)}
.cfc-prev{padding:14px 14px 8px;min-height:80px;display:flex;align-items:flex-end}
.cfc-samp{line-height:1.1;word-break:break-all;pointer-events:none}
.cfc-foot{
  padding:7px 10px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
}
.cfc-name{
  font-size:10px;color:var(--text-muted);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;flex:1;
  cursor:pointer;transition:color .15s;
}
.cfc-name:hover{color:var(--accent)}
.cfc-use{
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;
  cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;transition:all .15s;
}
.cfc-use.uh{background:var(--h-bg);color:var(--h-color);border:1px solid var(--h-bdr)}
.cfc-use.ub{background:var(--b-bg);color:var(--b-color);border:1px solid var(--b-bdr)}
.cfc-use:hover{opacity:.75}
.cfc-rm{
  font-size:11px;color:var(--text-dim);background:none;border:none;
  cursor:pointer;padding:2px 5px;
  font-family:'Zen Kaku Gothic New',sans-serif;transition:color .15s;
}
.cfc-rm:hover{color:#ff6060}
.col-empty{font-size:12px;color:var(--text-dim);text-align:center;padding:32px 0;line-height:1.9}

/* toast */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--accent);color:#fff;font-size:12px;font-weight:700;
  padding:8px 20px;border-radius:99px;
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;
  z-index:9999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="logo">もじ<em>ペア</em></div>
  <div class="tagline">フォントのペアリングをかんたんに確認できるツール</div>
  <div class="hd-right">
    <input type="file" id="font-file" accept=".ttf,.otf,.woff,.woff2" multiple style="display:none" onchange="uploadFonts(event)">
    <button class="hd-btn" onclick="document.getElementById('font-file').click()">＋ フォントをアップロード</button>
    <button class="hd-btn primary" id="sync-btn" onclick="syncLocal()">⟳ ローカルフォントを同期</button>
  </div>
</div>

<!-- FIXED PREVIEW -->
<div class="preview-fixed">
  <div class="pf-displays">
    <div class="pf-box" id="pf-h"
      ondragover="pfOver(event,this)" ondragleave="pfLeave(this)" ondrop="pfDrop(event,'h')">
      <span class="pf-role">H 見出し</span>
      <span class="pf-font-label" id="pf-h-label" onclick="copyFont(pfFont.h,event)" style="cursor:pointer" title="クリックでコピー"></span>
      <span class="pf-drop-hint">フォントをドロップ ↓</span>
      <div class="pf-text" id="pf-h-text" contenteditable="true" style="font-size:40px">フォントの組み合わせを見つけよう</div>
    </div>
    <div class="pf-box" id="pf-b"
      ondragover="pfOver(event,this)" ondragleave="pfLeave(this)" ondrop="pfDrop(event,'b')">
      <span class="pf-role">B 本文</span>
      <span class="pf-font-label" id="pf-b-label" onclick="copyFont(pfFont.b,event)" style="cursor:pointer" title="クリックでコピー"></span>
      <span class="pf-drop-hint">フォントをドロップ ↓</span>
      <div class="pf-text" id="pf-b-text" contenteditable="true" style="font-size:17px;line-height:1.8">見出しと本文のフォントを選び、相性を確認できます。<br>自分に合ったタイポグラフィを見つけてください。</div>
    </div>
  </div>
  <div class="pf-controls">
    <div class="sz-group">
      <span class="sz-label">見出しサイズ</span>
      <input type="range" id="sz-h" min="20" max="96" step="2" value="40" oninput="onSzH(this.value)">
      <span class="sz-val" id="sz-h-val">40px</span>
    </div>
    <div class="sz-group">
      <span class="sz-label">本文サイズ</span>
      <input type="range" id="sz-b" min="10" max="48" step="1" value="17" oninput="onSzB(this.value)">
      <span class="sz-val" id="sz-b-val">17px</span>
    </div>
    <button class="hd-btn" onclick="savePreviewImage()" style="margin-left:auto;background:none;border:1px solid var(--border2);color:var(--accent);font-weight:700" id="save-btn">↓ 画像を保存</button>
    <button class="hd-btn" onclick="shareChecked()" style="background:none;border:1px solid var(--border2);color:var(--accent);font-weight:700">🔗 リストを共有</button>
    <button class="hd-btn" onclick="savePair()" style="background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700">＋ ペアを保存</button>
  </div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab active" onclick="switchTab('list',this)">フォント一覧</button>
  <button class="tab" onclick="switchTab('checked',this)">チェックフォント一覧<span class="tab-badge" id="badge" style="display:none">0</span></button>
  <button class="tab" onclick="switchTab('pairs',this)">保存したペア<span class="tab-badge" id="pairs-badge" style="display:none">0</span></button>
</div>

<!-- PANELS -->
<div class="panels">

  <!-- TAB1 -->
  <div class="panel active" id="panel-list">
    <div class="t1-ctrl">
      <div class="filter-row">
        <button class="fbtn active" onclick="setFilter('all',this)">すべて</button>
        <button class="fbtn" onclick="setFilter('ja',this)">JP フォント</button>
        <button class="fbtn" onclick="setFilter('en',this)">EN フォント</button>
        <button class="fbtn" onclick="setFilter('google',this)">Googleフォント</button>
        <button class="fbtn" onclick="setFilter('local',this)">マイフォント</button>
      </div>
      <input class="srch" id="sample-txt" type="text" value="あ Aa 123" placeholder="サンプルテキスト..." oninput="onSampleChange(this.value)" style="width:120px">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:11px;color:var(--text-muted);white-space:nowrap">列数</span>
        <input type="range" id="grid-cols" min="2" max="8" step="1" value="4" oninput="onGridCols(this.value)" style="width:70px">
        <span style="font-size:11px;font-weight:700;color:var(--accent);min-width:20px" id="grid-cols-val">4</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:11px;color:var(--text-muted);white-space:nowrap">ウェイト</span>

function makeKey(name,w){return name+'::'+w;}
function parseKey(key){var p=key.lastIndexOf('::');return p<0?{name:key,weight:400}:{name:key.slice(0,p),weight:parseInt(key.slice(p+2))||400};}

function onSampleChange(v){sampleText=v||'あ Aa 123';renderGrid();}
function onGridCols(v){gridCols=parseInt(v);document.getElementById('grid-cols-val').textContent=v;renderGrid();}
function onGridWeight(v){sampleWeight=parseInt(v);renderGrid();}

function allFonts(){return GFONTS.map(function(f){return{n:f.n,c:f.c,local:false};}).concat(localFonts);}
function isLocal(n){return localFonts.some(function(f){return f.n===n;});}

function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='checked')renderChecked();
  if(t==='pairs')renderPairs();
}

// ---- PAIRS ----
function savePair(){
  var hKey=pfFont.h;
  var bKey=pfFont.b;
  if(!hKey&&!bKey){showToast('まずH・Bにフォントを設定してください');return;}
  var ph=hKey?parseKey(hKey):null;
  var pb=bKey?parseKey(bKey):null;
  var hText=document.getElementById('pf-h-text').innerText||'';
  var bText=document.getElementById('pf-b-text').innerText||'';
  var hSize=document.getElementById('sz-h-val').textContent||'40px';
  var bSize=document.getElementById('sz-b-val').textContent||'17px';
  var now=new Date();
  var ts=now.getMonth()+1+'/'+now.getDate()+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  savedPairs.unshift({
    h:ph?ph.name:null, hWeight:ph?ph.weight:400,
    b:pb?pb.name:null, bWeight:pb?pb.weight:400,
    hText:hText,bText:bText,hSize:hSize,bSize:bSize,ts:ts,id:Date.now()
  });
  savePairsStorage();
  updatePairsBadge();
  showToast('ペアを保存しました');
}

function savePairsStorage(){
  try{localStorage.setItem('mojipair_pairs',JSON.stringify(savedPairs));}catch(e){}
}

function loadPairsStorage(){
  try{
    var s=localStorage.getItem('mojipair_pairs');
    if(s)savedPairs=JSON.parse(s)||[];
  }catch(e){savedPairs=[];}
}

function updatePairsBadge(){
  var b=document.getElementById('pairs-badge');
  if(savedPairs.length>0){b.textContent=savedPairs.length;b.style.display='inline-flex';}
  else b.style.display='none';
}

function deletePair(id){
  savedPairs=savedPairs.filter(function(p){return p.id!==id;});
  savePairsStorage();updatePairsBadge();renderPairs();
}

function applyPair(id){
  var p=savedPairs.find(function(x){return x.id===id;});
  if(!p)return;
  var hWeight=p.hWeight||400;
  var bWeight=p.bWeight||400;
  if(p.h){
    var hKey=makeKey(p.h,hWeight);
    pfFont.h=hKey;loadGF(p.h);
    document.getElementById('pf-h-text').style.fontFamily="'"+p.h+"',serif";
    document.getElementById('pf-h-text').style.fontWeight=hWeight;
    document.getElementById('pf-h-label').textContent=p.h+' '+hWeight;
  }
  if(p.b){
    var bKey=makeKey(p.b,bWeight);
    pfFont.b=bKey;loadGF(p.b);
    document.getElementById('pf-b-text').style.fontFamily="'"+p.b+"',serif";
    document.getElementById('pf-b-text').style.fontWeight=bWeight;
    document.getElementById('pf-b-label').textContent=p.b+' '+bWeight;
  }
  var szH=parseInt(p.hSize)||40;
  var szB=parseInt(p.bSize)||17;
  document.getElementById('pf-h-text').style.fontSize=szH+'px';
  document.getElementById('sz-h').value=szH;
  document.getElementById('sz-h-val').textContent=p.hSize;
  document.getElementById('pf-b-text').style.fontSize=szB+'px';
  document.getElementById('sz-b').value=szB;
  document.getElementById('sz-b-val').textContent=p.bSize;
  showToast('ペアを適用しました');
}

function clearAllPairs(){
  if(!savedPairs.length)return;
  if(!confirm('保存したペアをすべて削除しますか？'))return;
  savedPairs=[];savePairsStorage();updatePairsBadge();renderPairs();
}

function renderPairs(){
  var empty=document.getElementById('pairs-empty');
  var ctrl=document.getElementById('pairs-ctrl');
  var list=document.getElementById('pairs-list');
  if(!empty||!ctrl||!list)return;

  if(!savedPairs.length){
    empty.style.display='block';
    ctrl.style.display='none';
    list.style.display='none';
    list.innerHTML='';
    return;
  }

  empty.style.display='none';
  ctrl.style.display='flex';
  list.style.display='grid';
  list.style.gridTemplateColumns='repeat('+pairsCols+',1fr)';

  list.innerHTML=savedPairs.map(function(p,idx){
    var hWeight=p.hWeight||400;
    var bWeight=p.bWeight||400;
    var hLabel=p.h?(p.h+' '+hWeight):'(なし)';
    var bLabel=p.b?(p.b+' '+bWeight):'(なし)';
    var hMissing=p.h&&missingFonts.has(p.h);
    var bMissing=p.b&&missingFonts.has(p.b);
    var hDispSz=Math.min(parseInt(p.hSize)||40,24);
    var bDispSz=Math.min(parseInt(p.bSize)||17,14);
    var hStyle=p.h?"font-family:'"+esc(p.h)+"',serif;font-size:"+hDispSz+"px;font-weight:"+hWeight:"font-size:"+hDispSz+"px";
    var bStyle=p.b?"font-family:'"+esc(p.b)+"',sans-serif;font-size:"+bDispSz+"px;font-weight:"+bWeight:"font-size:"+bDispSz+"px";
    return '<div class="pair-card" data-idx="'+idx+'" draggable="true"'
      +' onclick="applyPair('+p.id+')"'
      +' ondragstart="pairDragStart(event,'+idx+')"'
      +' ondragover="pairDragOver(event)"'
      +' ondrop="pairDrop(event,'+idx+')"'
      +' ondragleave="pairDragLeave(event)"'
      +' style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .15s"'
      +' onmouseover="this.style.borderColor=\'var(--accent)\'" onmouseout="this.style.borderColor=\'var(--border)\'">'
      +'<div style="background:#fff;padding:14px 16px 10px;min-height:80px">'
        +'<div style="'+hStyle+';color:#0e0e10;line-height:1.2;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(p.hText||'見出しテキスト')+'</div>'
        +'<div style="'+bStyle+';color:#444;line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+esc(p.bText||'本文テキスト')+'</div>'
      +'</div>'
      +'<div style="padding:8px 10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px">'
        +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:10px;color:'+(hMissing?'#ff6060':'var(--accent)')+';font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">H: '+esc(hLabel)+(hMissing?' ⚠':'')+'</div>'
          +'<div style="font-size:10px;color:'+(bMissing?'#ff6060':'var(--b-color)')+';font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">B: '+esc(bLabel)+(bMissing?' ⚠':'')+'</div>'
        +'</div>'
        +'<span style="font-size:10px;color:var(--text-dim);flex-shrink:0">'+p.ts+'</span>'
        +'<button onclick="event.stopPropagation();deletePair('+p.id+')" style="padding:3px 8px;font-size:11px;border:none;background:none;color:var(--text-dim);cursor:pointer;flex-shrink:0" title="削除">✕</button>'
      +'</div>'
      +((hMissing||bMissing)?'<div style="font-size:10px;color:#ff6060;padding:4px 10px 6px;background:rgba(255,96,96,0.07)">'+(hMissing&&bMissing?'H・B両方のフォントはあなたは持っていません':hMissing?'H（見出し）のフォントはあなたは持っていません':'B（本文）のフォントはあなたは持っていません')+'</div>':'')
    +'</div>';
  }).join('');
  setPairsCols(pairsCols);
}

// ---- PAIRS COLUMNS ----
var pairsCols=2;
function setPairsCols(n){
  pairsCols=n;
  [1,2,3].forEach(function(i){
    var btn=document.getElementById('pcol-'+i);
    if(!btn)return;
    btn.style.background=i===n?'var(--surface2)':'none';
    btn.style.color=i===n?'var(--text)':'var(--text-muted)';
    btn.style.fontWeight=i===n?'700':'400';
  });
  var list=document.getElementById('pairs-list');
  if(list&&list.style.display!=='none')list.style.gridTemplateColumns='repeat('+n+',1fr)';
}

// ---- PAIRS DRAG & DROP ----
var dragSrcIdx=null;
function pairDragStart(e,idx){
  dragSrcIdx=idx;
  e.dataTransfer.effectAllowed='move';
  setTimeout(function(){e.target.style.opacity='0.4';},0);
}
function pairDragOver(e){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  e.currentTarget.style.borderColor='var(--accent)';
}
function pairDragLeave(e){
  e.currentTarget.style.borderColor='var(--border)';
}
function pairDrop(e,toIdx){
  e.preventDefault();e.stopPropagation();
  e.currentTarget.style.borderColor='var(--border)';
  if(dragSrcIdx===null||dragSrcIdx===toIdx){dragSrcIdx=null;return;}
  var moved=savedPairs.splice(dragSrcIdx,1)[0];
  savedPairs.splice(toIdx,0,moved);
  dragSrcIdx=null;
  savePairsStorage();renderPairs();
}

// PREVIEW
function onSzH(v){document.getElementById('pf-h-text').style.fontSize=v+'px';document.getElementById('sz-h-val').textContent=v+'px';}
function onSzB(v){document.getElementById('pf-b-text').style.fontSize=v+'px';document.getElementById('sz-b-val').textContent=v+'px';}
function pfOver(e,el){e.preventDefault();e.stopPropagation();el.classList.add('drop-over');}
function pfLeave(el){el.classList.remove('drop-over');}
function pfDrop(e,role){
  e.preventDefault();e.stopPropagation();
  document.getElementById('pf-'+role).classList.remove('drop-over');
  var key=e.dataTransfer.getData('text/plain');
  if(!key&&dragFont)key=dragFont;
  if(!key)return;
  if(key.indexOf('::')<0)key=makeKey(key,sampleWeight);
  applyPfFont(role,key);
  dragFont=null;
}
function applyPfFont(role,key){
  var p=parseKey(key);
  pfFont[role]=key;loadGF(p.name);
  document.getElementById('pf-'+role+'-text').style.fontFamily="'"+p.name+"',serif";
  document.getElementById('pf-'+role+'-text').style.fontWeight=p.weight;
  document.getElementById('pf-'+role+'-label').textContent=p.name+' '+p.weight;
  renderChecked();
}

// GRID
function setFilter(f,el){
  catFilter=f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  renderGrid();
}

function renderGrid(){
  var q=(document.getElementById('srch').value||'').toLowerCase();
  var all=allFonts();
  var filtered=all.filter(function(f){
    var mq=f.n.toLowerCase().includes(q);
    if(catFilter==='all')return mq;
    if(catFilter==='google')return mq&&!f.local;
    if(catFilter==='local')return mq&&f.local;
    // JP/ENフィルターはマイフォントも含める
    return mq&&f.c===catFilter;
  });

  var showCats;
  if(catFilter==='all')showCats=['ja','en','local'];
  else if(catFilter==='google')showCats=['ja','en'];
  else if(catFilter==='local')showCats=['local'];
  else showCats=[catFilter,'local']; // JP/ENフィルター時もマイフォントセクションを表示

  var catLbl={local:'マイフォント',ja:'JP フォント',en:'EN フォント'};
  var html='';
  showCats.forEach(function(cat){
    var items;
    if(cat==='local'){
      items=filtered.filter(function(f){return f.local;});
    } else {
      // カテゴリ一致（マイフォント含む）ただしgoogleフィルター時はlocalを除外
      items=filtered.filter(function(f){
        if(catFilter==='all'||catFilter==='ja'||catFilter==='en')
          return f.c===cat&&!f.local;
        return f.c===cat&&!f.local;
      });
    }
    if(!items.length)return;
    html+='<div class="sec-hd">'+catLbl[cat]+' <span style="font-weight:400;opacity:.6">('+items.length+')</span></div><div class="fgrid" style="grid-template-columns:repeat('+gridCols+',1fr)">';
    items.forEach(function(f){
      var tcls=f.local?'fc-tag local':'fc-tag';
      var tagLbl=f.local?'マイ':f.c==='ja'?'JP':'EN';
      var key=makeKey(f.n,sampleWeight);
      var r=roles[key]||{};
      var hOn=r.h?'h-on':'';var bOn=r.b?'b-on':'';
      html+='<div class="fc" draggable="true" ondragstart="onDragStart(event,\''+ea(key)+'\')">'
        +'<div class="fc-prev"><div class="fc-samp" style="font-family:\''+esc(f.n)+'\',serif;font-size:'+Math.round(sampleSize*(5/gridCols))+'px;font-weight:'+sampleWeight+'">'+esc(sampleText)+'</div></div>'
        +'<div class="fc-foot">'
          +'<span class="fc-name" title="クリックでコピー" onclick="copyFont(\''+ea(f.n)+'\',event)">'+esc(f.n)+'</span>'
          +'<span class="'+tcls+'">'+tagLbl+'</span>'
          +'<div class="hb-btns">'
            +'<button class="hb '+hOn+'" onclick="toggleRole(\''+ea(key)+'\',\'h\')">H</button>'
            +'<button class="hb '+bOn+'" onclick="toggleRole(\''+ea(key)+'\',\'b\')">B</button>'
          +'</div>'
        +'</div>'
      +'</div>';
      if(!f.local)loadGF(f.n);
    });
    html+='</div>';
  });
  if(!html)html='<div style="padding:48px;text-align:center;color:var(--text-dim);font-size:13px">見つかりません</div>';
  document.getElementById('t1-body').innerHTML=html;
}

function toggleRole(key,role){
  var p=parseKey(key);
  if(!roles[key])roles[key]={h:false,b:false};
  roles[key][role]=!roles[key][role];
  if(!roles[key].h&&!roles[key].b)delete roles[key];
  loadGF(p.name);
  saveRoles();
  updateBadge();renderGrid();renderChecked();
}

function saveRoles(){
  try{localStorage.setItem('mojipair_roles',JSON.stringify(roles));}catch(e){}
}

function loadRoles(){
  try{
    var saved=localStorage.getItem('mojipair_roles');
    if(saved){
      var parsed=JSON.parse(saved);
      // バリデーション：rolesの形式チェック
      if(typeof parsed==='object'&&parsed!==null){
        roles=parsed;
        Object.keys(roles).forEach(function(name){loadGF(name);});
      }
    }
  }catch(e){}
}

function clearAllRoles(){
  if(!Object.keys(roles).length)return;
  if(!confirm('チェックしたフォントをすべてクリアしますか？'))return;
  roles={};
  pfFont={h:null,b:null};
  var hl=document.getElementById('pf-h-label');
  var bl=document.getElementById('pf-b-label');
  if(hl)hl.textContent='';
  if(bl)bl.textContent='';
  saveRoles();
  updateBadge();renderGrid();renderChecked();
}

function shareChecked(){
  var keys=Object.keys(roles);
  if(!keys.length&&!savedPairs.length){showToast('チェックしたフォントまたはペアがありません');return;}
  try{
    var data={r:roles,p:savedPairs};
    var json=JSON.stringify(data);
    var bytes=new TextEncoder().encode(json);
    var binary=String.fromCharCode.apply(null,bytes);
    var encoded=btoa(binary);
    var url=location.href.split('#')[0]+'#fonts='+encoded;
    var input=document.getElementById('checked-share-input');
    var warn=document.getElementById('checked-share-warn');
    input.value=url;
    warn.textContent=url.length>4000
      ?'⚠ URL長: '+url.length+'文字。データが多いため一部の環境で開けない場合があります。'
      :'✓ URL長: '+url.length+'文字（問題ありません）';
    warn.style.color=url.length>4000?'#ff6060':'var(--accent)';
    document.getElementById('checked-share-modal').style.display='flex';
  }catch(e){showToast('共有リンクの生成に失敗しました');}
}

function copyCheckedUrl(){
  var input=document.getElementById('checked-share-input');
  var btn=document.getElementById('checked-share-copy-btn');
  var text=input.value;
  function done(){btn.textContent='コピー済み！';setTimeout(function(){btn.textContent='コピー';},2000);}
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(done);
  }else{
    input.select();try{document.execCommand('copy');}catch(e){}done();
  }
}

var restoredFromShare=false;
var missingFonts=new Set();  // 共有URLから復元したが持っていないフォント

function restoreFromHash(){
  var hash=location.hash;
  if(!hash||hash.indexOf('fonts=')<0)return;
  try{
    var encoded=hash.replace(/^#fonts=/,'');
    var binary=atob(encoded);
    var bytes=new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    var data=JSON.parse(new TextDecoder().decode(bytes));
    var msg=[];
    // 既知フォント名セット
    var knownNames=new Set(GFONTS.map(function(f){return f.n;}));
    localFonts.forEach(function(f){knownNames.add(f.n);});

    if(data.r&&typeof data.r==='object'){
      roles=data.r;
      Object.keys(roles).forEach(function(name){
        if(!knownNames.has(name))missingFonts.add(name);
        else loadGF(name);
      });
      saveRoles();updateBadge();renderGrid();
      msg.push('チェックフォント '+Object.keys(roles).length+'件');
    }
    if(data.p&&Array.isArray(data.p)&&data.p.length){
      savedPairs=data.p;
      savedPairs.forEach(function(p){
        if(p.h){if(!knownNames.has(p.h))missingFonts.add(p.h);else loadGF(p.h);}
        if(p.b){if(!knownNames.has(p.b))missingFonts.add(p.b);else loadGF(p.b);}
      });
      savePairsStorage();updatePairsBadge();
      msg.push('保存ペア '+savedPairs.length+'件');
    }
    restoredFromShare=true;
    if(msg.length)showToast('復元しました: '+msg.join(' / '));
  }catch(e){console.error('URL復元エラー:',e);}
}
function updateBadge(){
  var n=Object.keys(roles).length;
  var b=document.getElementById('badge');
  if(n>0){b.textContent=n;b.style.display='inline-flex';}else b.style.display='none';
}

// CHECKED
function renderChecked(){
  var hList=Object.keys(roles).filter(function(k){return roles[k].h;});
  var bList=Object.keys(roles).filter(function(k){return roles[k].b;});
  document.getElementById('cnt-h').textContent='　'+hList.length+'件';
  document.getElementById('cnt-b').textContent='　'+bList.length+'件';
  var szH=parseInt(document.getElementById('sz-h').value)||40;
  var szB=parseInt(document.getElementById('sz-b').value)||17;

  function makeCards(list,role,sz,useCls){
    if(!list.length)return '<div class="col-empty">フォント一覧タブで<br>'+(role==='h'?'H（見出し）':'B（本文）')+'を<br>チェックしてください</div>';
    return list.map(function(key){
      var p=parseKey(key);
      var name=p.name; var weight=p.weight;
      var isAct=pfFont[role]===key;
      var isMissing=missingFonts.has(name);
      var cls='cfc'+(isAct?' selected-'+role:'');
      return '<div class="'+cls+'" onclick="applyPfFont(\''+role+'\',\''+ea(key)+'\')" draggable="true" ondragstart="onDragStart(event,\''+ea(key)+'\')">'        +'<div class="cfc-prev"><div class="cfc-samp" style="font-family:\''+esc(name)+'\',serif;font-size:'+sz+'px;font-weight:'+weight+';color:var(--text)">'+esc(sampleText)+'</div></div>'        +'<div class="cfc-foot">'          +'<span class="cfc-name" title="クリックでコピー" onclick="event.stopPropagation();copyFont(\''+ea(name)+'\',event)">'+esc(name)+'</span>'          +'<span style="font-size:9px;color:var(--text-dim);flex-shrink:0">'+weight+'</span>'          +(isMissing?'<span style="font-size:9px;color:#ff6060;flex-shrink:0;white-space:nowrap">⚠ 未所持</span>':'')          +'<button class="cfc-use '+useCls+'" onclick="event.stopPropagation();applyPfFont(\''+role+'\',\''+ea(key)+'\')">'+( isAct?'✓ 適用中':'適用')+'</button>'          +'<button class="cfc-rm" onclick="event.stopPropagation();removeRole(\''+ea(key)+'\',\''+role+'\')">'+'✕</button>'        +'</div>'        +(isMissing?'<div style="font-size:10px;color:#ff6060;padding:4px 10px 6px;background:rgba(255,96,96,0.07)">このフォントはあなたは持っていません</div>':'')      +'</div>';
    }).join('');
  }
  document.getElementById('col-h-list').innerHTML=makeCards(hList,'h',szH,'uh');
  document.getElementById('col-b-list').innerHTML=makeCards(bList,'b',szH,'ub');
}

function removeRole(key,role){
  if(roles[key])roles[key][role]=false;
  if(roles[key]&&!roles[key].h&&!roles[key].b)delete roles[key];
  if(pfFont[role]===key){pfFont[role]=null;document.getElementById('pf-'+role+'-label').textContent='';}
  updateBadge();renderGrid();renderChecked();
}

// DRAG
function onDragStart(e,key){
  dragFont=key;
  e.dataTransfer.effectAllowed='copy';
  e.dataTransfer.setData('text/plain',key);
}

// GOOGLE FONTS
function loadGF(name){
  if(loadedGF.has(name)||isLocal(name))return;
  var enc=name.replace(/ /g,'+');
  var l=document.createElement('link');
  l.rel='stylesheet';
  l.href='https://fonts.googleapis.com/css2?family='+enc+':wght@100;200;300;400;500;600;700;800;900&display=swap';
  document.head.appendChild(l);
  loadedGF.add(name);
}

// JP/EN 自動判定（フォント名に日本語キーワードが含まれるかで判定）
function guessLang(name){
  var jpKeywords=/gothic|mincho|maru|kaku|antique|japanese|japan|\bjp\b|noto.*jp|sans.*jp|serif.*jp|ipa|mplus|m\+|biz|hina|shippori|sawarabi|kosugi|klee|yuji|yusei|kaisei|dela|train|reggae|rocknroll|dotgothic|stick|murecho|zen.*kaku|zen.*maru|zen.*old|zen.*antique|zen.*kurenaido|hachi|tegomin|palette|biz.*ud|ud.*gothic|ud.*mincho/i;
  return jpKeywords.test(name)?'ja':'en';
}

// LOCAL SYNC
async function syncLocal(){
  var btn=document.getElementById('sync-btn');
  if(!('queryLocalFonts' in window)){
    btn.textContent='⚠ Chrome以外は非対応';
    setTimeout(function(){btn.textContent='⟳ ローカルフォントを同期';},3000);return;
  }
  try{
    btn.textContent='許可をリクエスト中...';
    var fonts=await window.queryLocalFonts();
    var seen=new Set(localFonts.map(function(f){return f.n;}));
    var added=0;
    fonts.forEach(function(f){
      var n=f.family;
      if(!seen.has(n)&&!GFONTS.some(function(g){return g.n===n;})){
        seen.add(n);
        localFonts.push({n:n,c:guessLang(n),local:true});
        added++;
      }
    });
    btn.textContent='✓ '+added+'個を同期完了';
    setTimeout(function(){btn.textContent='⟳ ローカルフォントを同期';},3000);
    renderGrid();
  }catch(e){
    btn.textContent='⚠ 許可が必要です';
    setTimeout(function(){btn.textContent='⟳ ローカルフォントを同期';},3000);
  }
}

// UPLOAD
function uploadFonts(e){
  Array.from(e.target.files).forEach(function(file){
    var name=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
    var reader=new FileReader();
    reader.onload=function(ev){
      var ff=new FontFace(name,ev.target.result);
      ff.load().then(function(loaded){
        document.fonts.add(loaded);
        if(!localFonts.some(function(f){return f.n===name;}))
          localFonts.push({n:name,c:guessLang(name),local:true});
        renderGrid();
      }).catch(function(){showToast('読み込み失敗: '+name);});
    };
    reader.readAsArrayBuffer(file);
  });
  e.target.value='';
}

// SAVE PREVIEW IMAGE
function savePreviewImage(){
  var btn=document.getElementById('save-btn');
  btn.textContent='生成中...';btn.disabled=true;

  var hEl=document.getElementById('pf-h-text');
  var bEl=document.getElementById('pf-b-text');
  var hParsed=pfFont.h?parseKey(pfFont.h):{name:'Zen Kaku Gothic New',weight:400};
  var bParsed=pfFont.b?parseKey(pfFont.b):{name:'Zen Kaku Gothic New',weight:400};
  var hFont=hParsed.name;
  var bFont=bParsed.name;
  var hWeight=hParsed.weight;
  var bWeight=bParsed.weight;
  var hSize=parseInt(document.getElementById('sz-h').value)||40;
  var bSize=parseInt(document.getElementById('sz-b').value)||17;
  var hText=hEl.innerText||hEl.textContent;
  var bText=bEl.innerText||bEl.textContent;

  // 2倍解像度で高画質に
  var SCALE=2;
  var W=1200,PAD=64;
  var canvas=document.createElement('canvas');
  var ctx=canvas.getContext('2d');

  function wrapText(ctx,text,maxW){
    var lines=[];
    text.split('\n').forEach(function(para){
      if(para===''){lines.push('');return;}
      var chars=para.split('');
      var line='';
      for(var i=0;i<chars.length;i++){
        var test=line+chars[i];
        if(ctx.measureText(test).width>maxW&&line!==''){
          lines.push(line);line=chars[i];
        } else {line=test;}
      }
      if(line!==''||para!=='')lines.push(line);
    });
    return lines;
  }

  var innerW=W-PAD*2;

  // measure heights at 1x then scale canvas
  ctx.font=hWeight+' '+hSize+'px \''+hFont+'\', serif';
  var hLines=wrapText(ctx,hText,innerW);
  var hBlockH=Math.max(hLines.length*Math.round(hSize*1.45)+PAD*2, hSize*2+PAD*2);

  ctx.font=bWeight+' '+bSize+'px \''+bFont+'\', sans-serif';
  var bLines=wrapText(ctx,bText,innerW);
  var bBlockH=Math.max(bLines.length*Math.round(bSize*1.8)+PAD*2, bSize*3+PAD*2);

  var metaH=56;
  var totalH=hBlockH+bBlockH+metaH;

  // set canvas at 2x for high quality
  canvas.width=W*SCALE;
  canvas.height=totalH*SCALE;
  canvas.style.width=W+'px';
  canvas.style.height=totalH+'px';
  ctx.scale(SCALE,SCALE);
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';

  // 全体白背景
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,W,totalH);

  var y=0;

  // H BLOCK — 白背景
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,y,W,hBlockH);
  // 下の区切り線
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.fillRect(0,y+hBlockH-1,W,1);

  // H label
  ctx.fillStyle='#bbb';
  ctx.font='700 10px \'Zen Kaku Gothic New\', sans-serif';
  ctx.fillText('H  見出し',PAD,y+22);

  // H font name (orange, right)
  ctx.fillStyle='#e86a1a';
  var hFontLabel=hFont+' '+hWeight;
  var hFontLabelW=ctx.measureText(hFontLabel).width;
  ctx.fillText(hFontLabel,W-PAD-hFontLabelW,y+22);

  // H text
  ctx.fillStyle='#0e0e10';
  ctx.font=hWeight+' '+hSize+'px \''+hFont+'\', serif';
  var hY=y+PAD+hSize;
  hLines.forEach(function(line){
    ctx.fillText(line,PAD,hY);
    hY+=Math.round(hSize*1.45);
  });
  y+=hBlockH;

  // B BLOCK — 白背景
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,y,W,bBlockH);
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.fillRect(0,y+bBlockH-1,W,1);

  // B label
  ctx.fillStyle='#bbb';
  ctx.font='700 10px \'Zen Kaku Gothic New\', sans-serif';
  ctx.fillText('B  本文',PAD,y+22);

  // B font name
  ctx.fillStyle='#e86a1a';
  var bFontLabel=bFont+' '+bWeight;
  var bFontLabelW=ctx.measureText(bFontLabel).width;
  ctx.fillText(bFontLabel,W-PAD-bFontLabelW,y+22);

  // B text
  ctx.fillStyle='#0e0e10';
  ctx.font=bWeight+' '+bSize+'px \''+bFont+'\', sans-serif';
  var bY=y+PAD+bSize;
  bLines.forEach(function(line){
    ctx.fillText(line,PAD,bY);
    bY+=Math.round(bSize*1.8);
  });
  y+=bBlockH;

  // META STRIP
  ctx.fillStyle='#f5f4f2';
  ctx.fillRect(0,y,W,metaH);
  ctx.fillStyle='rgba(0,0,0,0.06)';
  ctx.fillRect(0,y,W,1);

  ctx.fillStyle='#1e1e22';
  ctx.font='700 13px \'Zen Kaku Gothic New\', sans-serif';
  ctx.fillText('もじペア',PAD,y+metaH/2+5);

  ctx.fillStyle='#999';
  ctx.font='400 12px \'Zen Kaku Gothic New\', sans-serif';
  var pairStr='H: '+hFont+' '+hWeight+'  ×  B: '+bFont+' '+bWeight;
  var pairW=ctx.measureText(pairStr).width;
  ctx.fillText(pairStr,W-PAD-pairW,y+metaH/2+5);

  // DOWNLOAD
  setTimeout(function(){
    var a=document.createElement('a');
    a.href=canvas.toDataURL('image/png',1.0);
    var fname='mojipair-'+(hFont+'-'+bFont).replace(/\s+/g,'_').toLowerCase()+'.png';
    a.download=fname;
    a.click();
    btn.textContent='↓ 画像を保存';btn.disabled=false;
    showToast('画像を保存しました');
  },100);
}

// COPY
var toastTimer=null;
function copyFont(name,e){
  if(e){e.stopPropagation();e.preventDefault();}
  if(!name)return;
  var decoded=name.replace(/&#39;/g,"'");
  // GitHub Pages等のhttps環境ではclipboard API優先
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(decoded).then(function(){
      showToast('"'+decoded+'" をコピーしました');
    }).catch(function(){fallbackCopy(decoded);});
  } else {
    fallbackCopy(decoded);
  }
}
function fallbackCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text;
  ta.setAttribute('readonly','');
  ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0;font-size:16px';
  document.body.appendChild(ta);
  ta.focus();
  ta.setSelectionRange(0,ta.value.length);
  var ok=false;
  try{ok=document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
  showToast(ok?'"'+text+'" をコピーしました':'コピーできませんでした（URLバーを確認）');
}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove('show');},2000);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ea(s){return String(s).replace(/'/g,'&#39;');}

roles={};
savedPairs=[];
